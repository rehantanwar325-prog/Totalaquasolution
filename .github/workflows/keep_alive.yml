name: Keep Supabase Active

on:
  schedule:
    # Runs at 00:00 UTC (5:30 AM IST) every 3 days
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual triggering from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive request to Supabase
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X GET "https://givabiaeqvlamyvigsjs.supabase.co/rest/v1/products?select=id&limit=1" \
            -H "apikey: sb_publishable_35Fcp9wKNOc2DpzmQqHeyw_jmnoq85m" \
            -H "Authorization: Bearer sb_publishable_35Fcp9wKNOc2DpzmQqHeyw_jmnoq85m"
